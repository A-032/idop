<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ざこざこせきゅりてぃ❤</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: "MS Pゴシック", "Meiryo", sans-serif;
            margin: 0;
            text-align: center;
            /* 背景にノイズ感のあるストライプ */
            background-image: repeating-linear-gradient(0deg, #000, #000 2px, #050505 2px, #050505 4px);
        }

        /* 派手なヘッダー */
        .danger-zone {
            background: #ff0000;
            color: #ffff00;
            padding: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            border-bottom: 10px yellow double;
            animation: bg-flash 0.3s infinite;
        }

        /* 外部画像セクション */
        .image-container {
            margin: 20px auto;
            border: 5px solid #00ff00;
            width: fit-content;
            background: #fff;
            padding: 10px;
        }

        .hacker-img {
            display: block;
            width: 300px; /* サイズ調整 */
            height: auto;
            /* 画像をわざと少し歪ませてチープにする */
            filter: contrast(150%) brightness(80%);
        }

        /* 怪しい日本語メッセージ */
        .message-box {
            background-color: rgba(0, 0, 255, 0.2);
            border: 2px dashed #ff00ff;
            margin: 20px;
            padding: 20px;
            line-height: 1.8;
        }

        .glitch-text {
            color: #00ffff;
            font-size: 1.8rem;
            text-shadow: 2px 2px #ff0000;
        }

        /* 昔懐かしいスクロール文字 */
        .marquee {
            background: yellow;
            color: black;
            font-weight: bold;
            padding: 10px;
            font-size: 1.2rem;
        }

        /* 点滅するボタン */
        .scam-button {
            background: linear-gradient(to bottom, #ff3300, #990000);
            color: white;
            border: 4px outset #ff6666;
            padding: 20px 40px;
            font-size: 2rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 30px;
            animation: pulse 0.5s infinite;
        }

        /* アニメーション */
        @keyframes bg-flash {
            0% { background: #ff0000; }
            50% { background: #000; }
            100% { background: #ff0000; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #ffff00; }
            100% { transform: scale(1); }
        }

        /* 広告バナー風 */
        .ad-banner {
            border: 2px solid #666;
            width: 468px;
            height: 60px;
            margin: 10px auto;
            background: #222;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="danger-zone">
        ⚠ 乗っ取られちゃったね ⚠
    </div>

    <marquee class="marquee">
       でたーでた！
    </marquee>

    <div class="main">
        <div class="message-box">
            <h2 class="glitch-text">おしっこを飲みたいですか？</h2>
            <p style="font-size: 1.3rem; color: #ff3333;">
                あなたのコンピュータは私たちのチームによって<b>ハッキングされました。</b><br>
                すべてのファイルは強力な暗号でロックされています。
            </p>

            <!-- 外部画像読み込みセクション -->
            <div class="image-container">
                <!-- ここに外部画像のURLを入れます（例としてプレースホルダー画像） -->
                <img src="https://imgur.com/4DDyMLI.gif" alt="HACKED" class="hacker-img">
                <p style="color: #000; font-weight: bold; margin: 5px 0 0;">[ とあるゲイのバサバサ ]</p>
            </div>

            <p>
                データを救いたければ、24時間以内に「ビットコイン」を送る必要があります。<br>
                警察に連絡しても無駄です。なぜなら無駄だからです。
            </p>
        </div>

        <a href="#" class="scam-button">
            💰 今すぐ支払う 💰
        </a>

      
        <p style="color: #444; font-size: 0.7rem;">
            &copy; ゲイ糞
        </p>
    </div>

</body>
</html>
